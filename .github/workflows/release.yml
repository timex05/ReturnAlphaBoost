name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Release Tag
        id: release_tag
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ github.event.inputs.tag }}"
            if ([string]::IsNullOrWhiteSpace($tag)) {
              throw "Release tag is required for manual runs."
            }
          } else {
            $tag = "${{ github.ref_name }}"
          }

          "release_tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Publish win-x86
        run: dotnet publish -c Release -r win-x86 -p:PublishSingleFile=true -p:SelfContained=true -p:PublishTrimmed=false -o ./publish/win-x86

      - name: Publish win-x64
        run: dotnet publish -c Release -r win-x64 -p:PublishSingleFile=true -p:SelfContained=true -p:PublishTrimmed=false -o ./publish/win-x64

      - name: Create source ZIP
        shell: pwsh
        run: |
          if ("${{ steps.release_tag.outputs.release_tag }}" -ne '') {
            git archive --format zip --output source.zip ${{ steps.release_tag.outputs.release_tag }}
          } else {
            git archive --format zip --output source.zip HEAD
          }

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.release_tag.outputs.release_tag }}
          release_name: Release ${{ steps.release_tag.outputs.release_tag }}
          body: Automated release by GitHub Actions
          draft: false
          prerelease: false

      - name: Upload source ZIP
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./source.zip
          asset_name: source.zip
          asset_content_type: application/zip

      - name: Upload win32 EXE
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./publish/win-x86/ReturnAlphaBoost.exe
          asset_name: ReturnAlphaBoost-win32.exe
          asset_content_type: application/octet-stream

      - name: Upload win64 EXE
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./publish/win-x64/ReturnAlphaBoost.exe
          asset_name: ReturnAlphaBoost-win64.exe
          asset_content_type: application/octet-stream
